<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121420;
            --card-bg: #1b1f2d;
            --input-bg: #24293a;
            --text-color: #e0e0e0;
            --placeholder-color: #7a829a;
            --accent-color: #5d5fef;
            --accent-hover: #4a4cd4;
            --border-color: #2e344a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* ESTILO BOTÓN VOLVER */
        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: var(--placeholder-color);
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: color 0.3s;
        }
        .btn-back:hover {
            color: var(--accent-color);
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            color: #8b8ea1;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: var(--placeholder-color);
        }

        /* Efecto al enfocar el input */
        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(93, 95, 239, 0.2);
            background-color: #2a3044;
        }

        button {
            margin-top: 10px;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(93, 95, 239, 0.3);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(93, 95, 239, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Animación de entrada */
        .container {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Botón para volver -->
    <a href="index.html" class="btn-back">← Volver al Inicio</a>
    
    <h2>Registro de Cliente</h2>
    
    <form id="clienteForm">
        <input type="text" id="nombres" placeholder="Nombres Completos" required>
        <input type="text" id="cedula" placeholder="Cédula" required>
        <input type="tel" id="celular" placeholder="Celular" required>
        <input type="text" id="direccion" placeholder="Dirección" required>
        <input type="text" id="barrio" placeholder="Barrio" required>
        <input type="text" id="ocupacion" placeholder="Ocupación" required>
        
        <button type="submit" id="btnGuardar">Guardar Cliente</button>
    </form>
</div>

<script type="module">
    // Importar los módulos necesarios de Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuración de tu proyecto Firebase (REEMPLAZA ESTOS DATOS)
  const firebaseConfig = {
    apiKey: "AIzaSyCd5NIu5q-iqD0CAQ0zjsObMEjzGCCsOf0",
    authDomain: "prestamos2-af433.firebaseapp.com",
    projectId: "prestamos2-af433",
    storageBucket: "prestamos2-af433.firebasestorage.app",
    messagingSenderId: "395076881965",
    appId: "1:395076881965:web:ef9d5b5a3f58f73b9272a4"
  };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('clienteForm');
    const btnGuardar = document.getElementById('btnGuardar');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Deshabilitar botón para evitar múltiples envíos
        btnGuardar.disabled = true;
        btnGuardar.innerText = "Guardando...";

        // Crear objeto con los datos del formulario
        const nuevoCliente = {
            nombres: document.getElementById('nombres').value,
            cedula: document.getElementById('cedula').value,
            celular: document.getElementById('celular').value,
            direccion: document.getElementById('direccion').value,
            barrio: document.getElementById('barrio').value,
            ocupacion: document.getElementById('ocupacion').value,
            fechaRegistro: serverTimestamp() // Recomendado para ordenarlos luego por fecha
        };

        try {
            // Guardar en la colección "clientes" de Firestore
            await addDoc(collection(db, "clientes"), nuevoCliente);
            
            // Limpiar el formulario
            form.reset();

            // Redirigir automáticamente al index.html
            window.location.href = 'index.html';
        } catch (error) {
            console.error("Error al guardar en Firebase: ", error);
            alert("Hubo un error al guardar el cliente.");
            btnGuardar.disabled = false;
            btnGuardar.innerText = "Guardar Cliente";
        }
    });
</script>

</body>
</html>
