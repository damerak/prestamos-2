<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobros Diarios - Gestorio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg-color: #121420; 
            --card-bg: #1b1f2d; 
            --input-bg: #24293a; 
            --text-color: #e0e0e0; 
            --accent-color: #5d5fef; 
            --border-color: #2e344a; 
            --danger: #ef4444; 
            --success: #4ade80; 
            --warning: #ffcc00; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        
        .container { width: 100%; max-width: 800px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        
        .btn-regresar { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: var(--accent-color); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem; 
        }

        h2 { font-size: 1.4rem; margin-bottom: 20px; color: white; }

        #buscador { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--input-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            color: white; 
            margin-bottom: 20px;
            font-size: 1rem;
            outline: none;
        }

        /* Estilo de Acordeón */
        .barrio-card { 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            margin-bottom: 10px; 
            border: 1px solid var(--border-color); 
            overflow: hidden; 
        }
        .barrio-header { 
            padding: 15px 20px; 
            background-color: #24293a; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-weight: 600;
        }
        .barrio-content { 
            display: none; 
            padding: 10px; 
            flex-direction: column; 
            gap: 10px; 
        }
        /* Clase para abrir el acordeón */
        .barrio-card.active .barrio-content { display: flex; }
        .barrio-card.active .barrio-header { border-bottom: 1px solid var(--border-color); color: var(--accent-color); }

        .cobro-item { 
            background-color: var(--bg-color); 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .info-cli { flex: 1; }
        .info-cli .nombre { display: block; font-weight: 600; font-size: 1rem; color: #fff; }
        .info-cli .detalles { font-size: 0.8rem; color: #8b8ea1; }
        
        .mora-tag { 
            display: inline-block;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            margin-top: 5px;
        }
        .mora-red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .mora-yellow { background: rgba(255, 204, 0, 0.2); color: var(--warning); }

        .btn-cobrar { 
            background-color: var(--success); 
            color: #121420; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }

        .empty-state { text-align: center; padding: 40px; color: #7a829a; }
        #iframeImpresion { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-regresar">← VOLVER AL INICIO</a>
    <h2>Cobros Pendientes</h2>
    
    <input type="text" id="buscador" placeholder="Buscar cliente o barrio...">

    <div id="listaCobros">
        <!-- Contenido dinámico -->
    </div>
</div>

<iframe id="iframeImpresion"></iframe>

<script>
    // Configuración Firebase (Usando la del segundo archivo proporcionado)
    const firebaseConfig = {
        apiKey: "AIzaSyCd5NIu5q-iqD0CAQ0zjsObMEjzGCCsOf0",
        authDomain: "prestamos2-af433.firebaseapp.com",
        projectId: "prestamos2-af433",
        storageBucket: "prestamos2-af433.firebasestorage.app",
        messagingSenderId: "395076881965",
        appId: "1:395076881965:web:ef9d5b5a3f58f73b9272a4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let prestamos = [];
    let clientes = [];
    let datosEmpresa = { nombre: "MI NEGOCIO", telefono: "000" };

    async function cargarDatos() {
        db.collection('config').doc('empresa').onSnapshot(doc => { if(doc.exists) datosEmpresa = doc.data(); });
        db.collection('clientes').onSnapshot(snapshot => {
            clientes = snapshot.docs.map(doc => doc.data());
            renderizarCobros();
        });
        db.collection('prestamos').onSnapshot(snapshot => {
            prestamos = snapshot.docs.map(doc => ({ id_firebase: doc.id, ...doc.data() }));
            renderizarCobros();
        });
    }

    // FUNCIÓN CRÍTICA: Cuenta días transcurridos EXCLUYENDO domingos
    function calcularDiasCobro(fechaInicioStr) {
        if (!fechaInicioStr) return 0;
        
        const partes = fechaInicioStr.split('/');
        let fechaCursor = new Date(partes[2], partes[1] - 1, partes[0]);
        fechaCursor.setHours(0, 0, 0, 0);
        
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0);

        let diasEfectivos = 0;

        // Empezamos a contar desde el día SIGUIENTE a la creación del préstamo
        while (fechaCursor < hoy) {
            fechaCursor.setDate(fechaCursor.getDate() + 1);
            // Si no es domingo (0), se cuenta como día de cobro
            if (fechaCursor.getDay() !== 0) {
                diasEfectivos++;
            }
        }
        return diasEfectivos;
    }

    function renderizarCobros() {
        const contenedor = document.getElementById('listaCobros');
        const filtro = document.getElementById('buscador').value.toLowerCase();
        contenedor.innerHTML = "";

        let listaMora = prestamos.map(p => {
            const cli = clientes.find(c => c.nombres === p.cliente) || { barrio: "SIN BARRIO" };
            
            // Valor de una sola cuota
            const valorCuotaIndividual = parseNum(p.cuota) || (parseNum(p.total) / parseNum(p.cuotas));
            
            // Cuotas que deberían haberse pagado hasta hoy (sin domingos)
            const cuotasQueDeberiaLlevar = calcularDiasCobro(p.fecha);
            
            // Cuotas que faltan por pagar de las que ya vencieron
            const cuotasPendientes = cuotasQueDeberiaLlevar - (p.abonosRealizados || 0);

            if (cuotasPendientes <= 0) return null; // Está al día o es domingo y ya pagó lo anterior

            return { 
                ...p, 
                barrio: cli.barrio.toUpperCase(), 
                cuotasPendientes, 
                valorCuotaIndividual,
                montoACobrar: valorCuotaIndividual * cuotasPendientes 
            };
        }).filter(item => item !== null);

        if (filtro) {
            listaMora = listaMora.filter(f => 
                f.cliente.toLowerCase().includes(filtro) || 
                f.barrio.toLowerCase().includes(filtro)
            );
        }

        // Agrupar por barrios
        const grupos = listaMora.reduce((acc, curr) => {
            acc[curr.barrio] = acc[curr.barrio] || [];
            acc[curr.barrio].push(curr);
            return acc;
        }, {});

        if (Object.keys(grupos).length === 0) {
            contenedor.innerHTML = '<div class="empty-state">No hay cobros pendientes (Hoy es domingo o todos están al día).</div>';
            return;
        }

        for (const barrio in grupos) {
            const card = document.createElement('div');
            card.className = 'barrio-card'; // Sin la clase 'active' para que estén minimizados
            card.innerHTML = `
                <div class="barrio-header" onclick="this.parentElement.classList.toggle('active')">
                    <span>📍 ${barrio}</span>
                    <span>${grupos[barrio].length} pendientes ▾</span>
                </div>
                <div class="barrio-content">
                    ${grupos[barrio].map(p => `
                        <div class="cobro-item">
                            <div class="info-cli">
                                <span class="nombre">${p.cliente}</span>
                                <span class="detalles">
                                    Cuota diaria: ${formatear(p.valorCuotaIndividual)}<br>
                                    Saldo restante: ${formatear(p.saldo)}
                                </span>
                                <br>
                                <span class="mora-tag ${p.cuotasPendientes > 1 ? 'mora-red' : 'mora-yellow'}">
                                    DEBE: ${p.cuotasPendientes} ${p.cuotasPendientes === 1 ? 'CUOTA' : 'CUOTAS'}
                                </span>
                            </div>
                            <div style="text-align:right">
                                <div style="font-size:0.7rem; color:var(--success); font-weight:bold; margin-bottom:5px;">COBRAR: ${formatear(p.montoACobrar)}</div>
                                <button class="btn-cobrar" onclick="procesarCobro('${p.id_firebase}', ${p.valorCuotaIndividual}, ${p.cuotasPendientes})">COBRAR</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            contenedor.appendChild(card);
        }
    }

    async function procesarCobro(id, valorCuota, cantidadCuotas) {
        const p = prestamos.find(x => x.id_firebase === id);
        if (!p) return;

        const montoTotalAbono = valorCuota * cantidadCuotas;
        const nuevoSaldo = parseNum(p.saldo) - montoTotalAbono;
        const nuevosAbonosContador = (p.abonosRealizados || 0) + cantidadCuotas;

        try {
            // Historial para control
            await db.collection('historial_impresiones').add({
                cliente: p.cliente,
                monto: montoTotalAbono,
                saldo: nuevoSaldo,
                fecha: new Date().toLocaleDateString(),
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                tipo: 'abono'
            });

            if (nuevoSaldo <= 0) {
                await db.collection('prestamos').doc(id).delete();
            } else {
                await db.collection('prestamos').doc(id).update({
                    saldo: nuevoSaldo,
                    abonosRealizados: nuevosAbonosContador
                });
            }

            imprimirTicket(p.cliente, montoTotalAbono, nuevoSaldo);
            
        } catch (e) {
            alert("Error al registrar el cobro");
        }
    }

    // Impresión (Tal cual la solicitaste)
    function imprimirTicket(cliente, abono, saldo) {
        const iframe = document.getElementById('iframeImpresion');
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(`
            <html><head><style>
                body { font-family: 'Courier New', monospace; width: 58mm; font-size: 12px; text-align: center; margin: 0; padding: 10px; }
                .bold { font-weight: bold; }
                .sep { border-top: 1px dashed black; margin: 10px 0; }
            </style></head>
            <body>
                <div class="bold">${datosEmpresa.nombre.toUpperCase()}</div>
                <div>TEL: ${datosEmpresa.telefono}</div>
                <div class="sep"></div>
                <div class="bold">RECIBO DE PAGO</div>
                <div style="text-align: left;">
                    FECHA: ${new Date().toLocaleDateString()}<br>
                    CLIENTE: ${cliente.toUpperCase()}
                </div>
                <div class="sep"></div>
                <div class="bold">ABONO: ${formatear(abono)}</div>
                <div class="bold">SALDO: ${formatear(saldo)}</div>
                <div class="sep"></div>
                <div>¡Gracias por su pago!</div>
            </body></html>
        `);
        doc.close();
        setTimeout(() => { iframe.contentWindow.print(); }, 500);
    }

    function parseNum(v) { 
        if(!v) return 0;
        return parseFloat(v.toString().replace(/\./g, '').replace('$','')) || 0; 
    }
    
    function formatear(n) { 
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n); 
    }

    document.getElementById('buscador').addEventListener('input', renderizarCobros);
    window.onload = cargarDatos;
</script>

</body>
</html>
