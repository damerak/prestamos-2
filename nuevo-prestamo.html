<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Préstamo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #121420;
            --input-bg: #1b1f2d;
            --input-border: #2e344a;
            --text-main: #e0e0e0;
            --text-dim: #8b8ea1;
            --accent: #5d5fef;
            --accent-hover: #4a4cd4;
            --success: #4ade80;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .btn-regresar {
            display: inline-block;
            margin-bottom: 15px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-regresar:hover { color: var(--accent); }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .card { width: 100%; max-width: 600px; animation: fadeIn 0.6s ease-out; }
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: #b18cf0; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        input, select { width: 100%; padding: 12px 15px; background-color: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: white; font-size: 1rem; outline: none; transition: all 0.3s ease; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(93, 95, 239, 0.15); }
        
        .summary-box { margin-top: 25px; background-color: #0b0d14; padding: 20px; border-radius: 8px; border-bottom: 2px solid var(--input-border); }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; }
        .summary-line span:last-child { color: var(--text-main); font-weight: 500; }
        .entregado-val { color: var(--success) !important; font-weight: bold !important; }
        
        .total-row { margin-top: 15px; padding-top: 15px; border-top: 1px solid #2e344a; display: flex; justify-content: space-between; align-items: center; }
        .total-label { color: var(--accent); font-weight: 600; font-size: 1.2rem; }
        .total-amount { font-size: 1.4rem; font-weight: 600; color: #fff; }
        
        button { width: 100%; margin-top: 20px; padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: #444; cursor: not-allowed; }

        /* Iframe invisible para impresión */
        #iframeImpresion { position: absolute; width: 0; height: 0; border: none; visibility: hidden; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="card">
    <a href="index.html" class="btn-regresar">← Volver al Inicio</a>
    <h2>Crear Préstamo</h2>
    <form id="prestamoForm">
        <div class="form-grid">
            <select id="selectCliente" class="full-width" required>
                <option value="">Seleccionar Cliente...</option>
            </select>
            
            <select id="frecuencia" class="full-width">
                <option value="diario">Crédito Diario</option>
                <option value="semanal">Crédito Semanal</option>
            </select>

            <input type="text" id="monto" placeholder="Monto (Ej: 600.000)" required>
            <input type="number" id="porcentaje" placeholder="%" value="20" required>
            <input type="number" id="cuotas" class="full-width" placeholder="Número de cuotas" required>
        </div>
        <div class="summary-box">
            <div class="summary-line"><span>Fecha Inicio:</span><span id="txtFecha">-</span></div>
            <div class="summary-line"><span>Bono Rifa:</span><span id="txtBono">$0</span></div>
            <div class="summary-line"><span>ENTREGADO AL CLIENTE:</span><span id="txtEntregado" class="entregado-val">$0</span></div>
            <div class="summary-line"><span id="lblValorCuota">Valor Cuota:</span><span id="txtCuota">$0</span></div>
            <div class="total-row">
                <span class="total-label">TOTAL A PAGAR:</span>
                <span class="total-amount" id="txtTotal">$0</span>
            </div>
        </div>
        <button type="submit" id="btnGuardar">Guardar e Imprimir</button>
    </form>
</div>

<iframe id="iframeImpresion"></iframe>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCd5NIu5q-iqD0CAQ0zjsObMEjzGCCsOf0",
    authDomain: "prestamos2-af433.firebaseapp.com",
    projectId: "prestamos2-af433",
    storageBucket: "prestamos2-af433.firebasestorage.app",
    messagingSenderId: "395076881965",
    appId: "1:395076881965:web:ef9d5b5a3f58f73b9272a4"
  };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById('prestamoForm');
    const selectCliente = document.getElementById('selectCliente');
    const frecuencia = document.getElementById('frecuencia');
    const inputMonto = document.getElementById('monto');
    const inputPorcentaje = document.getElementById('porcentaje');
    const inputCuotas = document.getElementById('cuotas');
    const txtFecha = document.getElementById('txtFecha');
    const txtBono = document.getElementById('txtBono');
    const txtEntregado = document.getElementById('txtEntregado');
    const txtCuota = document.getElementById('txtCuota');
    const txtTotal = document.getElementById('txtTotal');
    const btnGuardar = document.getElementById('btnGuardar');
    const lblValorCuota = document.getElementById('lblValorCuota');

    let clientesData = []; 

    async function cargarClientes() {
        try {
            const snapshot = await db.collection('clientes').get();
            clientesData = [];
            snapshot.forEach(doc => {
                let c = doc.data();
                clientesData.push(c);
            });

            // --- ORGANIZAR DE LA A A LA Z ---
            clientesData.sort((a, b) => a.nombres.localeCompare(b.nombres));

            selectCliente.innerHTML = '<option value="">Seleccionar Cliente...</option>';
            clientesData.forEach(c => {
                let option = document.createElement('option');
                option.value = c.nombres; 
                option.textContent = c.nombres;
                selectCliente.appendChild(option);
            });

        } catch (error) {
            console.error("Error al cargar clientes:", error);
        }
        txtFecha.textContent = new Date().toLocaleDateString();
    }

    selectCliente.addEventListener('change', () => {
        const clienteSeleccionado = clientesData.find(c => c.nombres === selectCliente.value);
        if (clienteSeleccionado && clienteSeleccionado.nota && clienteSeleccionado.nota.trim() !== "") {
            alert("⚠️ NOTA IMPORTANTE DEL CLIENTE:\n\n" + clienteSeleccionado.nota);
        }
    });

    frecuencia.addEventListener('change', () => {
        if (frecuencia.value === 'semanal') {
            inputCuotas.placeholder = "Número de semanas";
            lblValorCuota.textContent = "Valor Semanal:";
        } else {
            inputCuotas.placeholder = "Número de cuotas";
            lblValorCuota.textContent = "Valor Cuota:";
        }
        calcular();
    });

    function calcular() {
        let monto = parseFloat(inputMonto.value.replace(/\./g, "")) || 0;
        let porc = parseFloat(inputPorcentaje.value) || 0;
        let numPlazos = parseInt(inputCuotas.value) || 0;
        
        let total = monto + (monto * (porc / 100));
        let valorCuota = numPlazos > 0 ? (total / numPlazos) : 0;
        
        let bonoRifa = 0;
        if (frecuencia.value === 'diario') {
            bonoRifa = valorCuota;
        } else {
            bonoRifa = monto * 0.05;
        }

        let entregado = monto - bonoRifa;

        txtBono.textContent = formatearCOP(bonoRifa);
        txtEntregado.textContent = formatearCOP(entregado);
        txtCuota.textContent = formatearCOP(valorCuota);
        txtTotal.textContent = formatearCOP(total);
    }

    inputMonto.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        calcular();
    });
    
    [inputPorcentaje, inputCuotas].forEach(el => el.addEventListener('input', calcular));

    function formatearCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n); }

    function imprimirNuevoPrestamo(datos) {
        const empresa = JSON.parse(localStorage.getItem('datosEmpresa')) || { nombre: "EMPRESA", telefono: "000", ciudad: "BOGOTA" };
        const cf = JSON.parse(localStorage.getItem('ticketConfig')) || { 
            width: 58, marginTop: 10, marginSide: 5, fontSize: 12, 
            separator: "--------------------------------", bold: false 
        };

        const tipoPlazo = frecuencia.value === 'semanal' ? "SEMANAS" : "CUOTAS";
        const bonoValor = parseFloat(txtBono.textContent.replace(/[^0-9]/g,""));
        const entregadoValor = datos.monto - bonoValor;

        const iframe = document.getElementById('iframeImpresion');
        const win = iframe.contentWindow;
        const doc = win.document;

        doc.open();
        doc.write(`
            <html>
            <head>
                <style>
                    @page { margin: 0; size: auto; }
                    body { 
                        width: 48mm; margin: 0 auto; 
                        padding: ${cf.marginTop}px 0; 
                        text-align: center; color: #000;
                        font-family: 'Courier New', monospace;
                        font-size: ${cf.fontSize}px;
                        line-height: 1.2;
                    }
                    .bold { font-weight: bold; }
                    .sep { margin: 5px 0; overflow: hidden; white-space: nowrap; }
                    .row { display: flex; justify-content: space-between; }
                    .box { border: 1px solid #000; padding: 5px; margin: 8px 0; }
                </style>
            </head>
            <body>
                <div class="bold">${empresa.nombre.toUpperCase()}</div>
                <div>TEL: ${empresa.telefono}</div>
                <div>${empresa.ciudad.toUpperCase()}</div>
                <div class="sep">${cf.separator}</div>
                <div class="bold">NUEVO PRÉSTAMO (${frecuencia.value.toUpperCase()})</div>
                <div class="sep">${cf.separator}</div>
                <div style="text-align:left">
                    FECHA: ${new Date().toLocaleDateString()}<br>
                    CLIENTE: <span class="bold">${datos.cliente.toUpperCase()}</span>
                </div>
                <div class="sep">${cf.separator}</div>
                <div class="row"><span>MONTO:</span><span>${formatearCOP(datos.monto)}</span></div>
                <div class="row"><span>INTERÉS:</span><span>${datos.porcentaje}%</span></div>
                <div class="row"><span>${tipoPlazo}:</span><span>${datos.cuotas}</span></div>
                <div class="row"><span>BONO RIFA:</span><span>${formatearCOP(bonoValor)}</span></div>
                <div class="sep">${cf.separator}</div>
                <div class="row bold"><span>ENTREGADO:</span><span>${formatearCOP(entregadoValor)}</span></div>
                <div class="box">
                    <div class="bold">TOTAL A PAGAR</div>
                    <div class="bold" style="font-size: 1.2em;">${datos.total}</div>
                </div>
                <div class="bold">VALOR ${tipoPlazo.slice(0,-1)}: ${txtCuota.textContent}</div>
                <div class="sep">${cf.separator}</div>
                <div style="margin-top:10px;">*** Gracias por su confianza ***</div>
                <div style="height:50px">.</div>
            </body>
            </html>
        `);
        doc.close();

        setTimeout(() => {
            win.focus();
            win.print();
        }, 500);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnGuardar.disabled = true;
        btnGuardar.textContent = "Guardando...";

        const montoReal = inputMonto.value.replace(/\./g, "");
        const prestamo = { 
            id: Date.now().toString(), 
            cliente: selectCliente.value, 
            monto: parseFloat(montoReal), 
            porcentaje: inputPorcentaje.value, 
            cuotas: inputCuotas.value, 
            frecuencia: frecuencia.value,
            total: txtTotal.textContent, 
            saldo: parseFloat(txtTotal.textContent.replace(/[^0-9]/g,"")), 
            fecha: new Date().toLocaleDateString()
        };
        
        const log = { ...prestamo, tipo: 'nuevo', hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };

        try {
            await db.collection('prestamos').doc(prestamo.id).set(prestamo);
            await db.collection('historial_impresiones').add(log);

            imprimirNuevoPrestamo(prestamo);

            form.reset();
            txtBono.textContent = "$0";
            txtEntregado.textContent = "$0";
            txtCuota.textContent = "$0";
            txtTotal.textContent = "$0";
            lblValorCuota.textContent = "Valor Cuota:";
            inputCuotas.placeholder = "Número de cuotas";
            
            alert("✅ Préstamo guardado e impreso con éxito.");

        } catch (error) {
            console.error("Error al guardar:", error);
            alert("Hubo un error al guardar en la base de datos.");
        } finally {
            btnGuardar.disabled = false;
            btnGuardar.textContent = "Guardar e Imprimir";
        }
    });

    window.onload = cargarClientes;
</script>
</body>
</html>
